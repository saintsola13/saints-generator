<!DOCTYPE html>
<html>
  <head>
    <title>Saints of LA - PFP Customiser</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.7/css/all.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="./stylesheets/style.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="./scripts/traits.js" crossorigin="anonymous"></script>
    <script src="./scripts/main.js" crossorigin="anonymous"></script>
    <meta name="description" content="Customise your Saints of LA PFP with this tool.">
    <meta property="og:title" content="Saints of LA - PFP Customiser" />
    <meta property="og:description" content="Customise your Saints of LA PFP with this tool." />
    <meta property="og:image" content="assets/saints_blank.png" />
  </head>
  <body>
    <div class='page-top container-fluid'>
      <div class='row'>
        <div class='col-12 text-center m-4'>
          <h1>Customise your Saint</h1>
        </div>
      </div>
      <div class='row'>
        <div class="col-md-0 col-lg-1 text-center mb-4"></div>
        <div class="col-md-12 col-lg-5 text-center mb-4">
          <div class="layers">
            <img src="assets/saints_blank.png" class="layer layer_bg" id="main_asset">
            <canvas class='layer' id='pfp'></canvas>
            <div class='loader layer'>
              <div class='spinner'></div>
            </div>
            <div class='clear'></div>
            <span id="download_button" class='primary_button'>Download</span>
          </div>
        </div>
        <div class="col-md-12 col-lg-6">
          <div class='trait_selectors p-3'>
            <div class='row'>
              <div class='col-md-12'>
                <div class='trait_selector'>Enter your Saint ID</div>
                <input type='text' id='token_id' class='p-2' placeholder='Enter Hooligan #' class='p-2'></select>
              </div>
              <div class='col-12 mt-3'>
                <div class='trait_selector'>Body</div>
                <select class='layer_select' id='body_select'></select>
              </div>
              <div class='col-12 mt-3'>
                <div class='trait_selector'>Outfit</div>
                <select class='layer_select js_layer_select' id='layer6'></select>
              </div>
              <div class='col-12 mt-3'>
                <div class='trait_selector'>Right Hand</div>
                <select class='layer_select body_type js_layer_select' id='layer1'></select>
              </div>
              <div class='col-12 mt-3'>
                <div class='trait_selector'>Left Hand</div>
                <select class='layer_select body_type js_layer_select' id='layer2'></select>
              </div>
              <div class='col-12 mt-3'>
                <div class='trait_selector'>Front Overlay</div>
                <select class='layer_select js_layer_select' id='layer5'></select>
              </div>
              <div class='col-12 mt-3'>
                <div class='trait_selector'>Top Right</div>
                <select class='layer_select js_layer_select' id='layer4'></select>
              </div>
              <div class='col-12 mt-3'>
                <div class='trait_selector'>Logo</div>
                <select class='layer_select js_layer_select' id='layer3'></select>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class='row'>
        <div class='col-12 text-center m-4'>
          <h1>Download your Banner</h1>
        </div>
      </div>
      <div class='row'>
        <div class="col-12 text-center mb-4">
          <canvas id="banner_preview"></canvas>
          <span id="download_banner" class='primary_button'>Download Banner</span>
        </div>
      </div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>
  </body>
</html>
