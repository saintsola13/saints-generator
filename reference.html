<!DOCTYPE html>
<html>
  <head>
    <title>Saints Reference Grid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="./stylesheets/style.css" rel="stylesheet">
    <script src="./scripts/traits.js"></script>
    <style>
      body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
      h1 { text-align: center; margin-bottom: 24px; }
      .controls { max-width: 720px; margin: 0 auto 32px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
      .controls label { font-weight: 600; align-self: center; }
      .controls select { padding: 6px 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; min-width: 180px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }
      .cell { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 8px; text-align: center; }
      .cell img { width: 100%; height: auto; background: #000; border-radius: 4px; image-rendering: pixelated; }
      .cell .label { margin-top: 6px; font-size: 14px; color: #ccc; }
      .cell .id { font-size: 11px; color: #666; font-family: monospace; }
      .missing { color: #a33; font-size: 12px; padding: 60px 0; }
    </style>
  </head>
  <body>
    <h1>Saints Reference Grid</h1>
    <div class="controls">
      <label for="layer_pick">Layer</label>
      <select id="layer_pick">
        <option value="right">Right Hand</option>
        <option value="left">Left Hand</option>
      </select>
      <label for="hand_pick">Pose</label>
      <select id="hand_pick"></select>
    </div>
    <div class="grid" id="grid"></div>

    <script>
      const bodies = window.all_traits["Body"];
      const rightHands = window.all_traits["Right Hand"];
      const leftHands = window.all_traits["Left Hand"];
      const layerPick = document.getElementById("layer_pick");
      const handPick = document.getElementById("hand_pick");
      const grid = document.getElementById("grid");

      function populateHands() {
        const hands = layerPick.value === "right" ? rightHands : leftHands;
        handPick.innerHTML = "";
        for (const [name, id] of Object.entries(hands)) {
          if (id.slice(-2) === "00") continue; // skip None
          const opt = document.createElement("option");
          opt.value = id;
          opt.textContent = `${name} (${id})`;
          handPick.appendChild(opt);
        }
        render();
      }

      function render() {
        const handId = handPick.value;
        grid.innerHTML = "";
        for (const [bodyName, bodyId] of Object.entries(bodies)) {
          const filename = bodyId + handId + ".png";
          const cell = document.createElement("div");
          cell.className = "cell";
          const img = document.createElement("img");
          img.src = `./assets/${filename}`;
          img.alt = `${bodyName} + ${handPick.options[handPick.selectedIndex].textContent}`;
          img.loading = "lazy";
          img.onerror = () => {
            img.style.display = "none";
            const miss = document.createElement("div");
            miss.className = "missing";
            miss.textContent = "(file missing)";
            cell.insertBefore(miss, cell.firstChild);
          };
          const label = document.createElement("div");
          label.className = "label";
          label.textContent = bodyName;
          const idLabel = document.createElement("div");
          idLabel.className = "id";
          idLabel.textContent = filename;
          cell.appendChild(img);
          cell.appendChild(label);
          cell.appendChild(idLabel);
          grid.appendChild(cell);
        }
      }

      layerPick.addEventListener("change", populateHands);
      handPick.addEventListener("change", render);
      populateHands();
    </script>
  </body>
</html>
